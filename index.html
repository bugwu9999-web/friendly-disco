<!DOCTYPE html>
<html>
<head>
    <title>Blessing Tattoo Stickers</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<nav>
    <h2 class="logo">💖 Blessing Stickers</h2>
    <div class="links">
        <a href="#shop">Shop</a>
        <a href="#cart">Cart (<span id="cart-count">0</span>)</a>
        <a href="https://instagram.com/">Instagram</a>
    </div>
</nav>

<section class="hero">
    <h1>Temporary. Trendy. Beautiful.</h1>
    <p>Premium tattoo stickers for fashion, birthdays & events.</p>
</section>

<section id="shop" class="shop">
    <h2>Shop Stickers</h2>

    <div class="products">

        <div class="card">
            <img src=-"Screenshot_20260129-031019.png">
            <h3>Floral Design</h3>
            <p>₦2000</p>
            <button onclick="addToCart('Floral Design',2000)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="Screenshot_20260129-045219.png
">
            <h3>Butterfly Pack</h3>
            <p>₦1500</p>
            <button onclick="addToCart('Butterfly Pack',1500)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="drawing-black-silhouettes-of-butterflies-on-a-white-background-vector.jpg">
            <h3>Minimal Symbols</h3>
            <p>₦2000</p>
            <button onclick="addToCart('Minimal Symbols',2000)">Add to Cart</button>
        </div>

    </div>
</section>

<section id="cart" class="cart">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <p>Total: ₦<span id="total">0</span></p>
    <button onclick="checkout()">Checkout on WhatsApp</button>
</section>

<footer>
    <p>📍 Enugu, Nigeria | © 2026 Blessing Tattoo Stickers</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    document.getElementById("cart-count").innerText = cart.length;
    document.getElementById("total").innerText = total;

    let li = document.createElement("li");
    li.innerText = name + " - ₦" + price;
    document.getElementById("cart-items").appendChild(li);
}

function checkout() {
    let message = "Hello, I want to order:%0A";
    cart.forEach(item => {
        message += item.name + " - ₦" + item.price + "%0A";
    });
    message += "Total: ₦" + total;

    window.open("https://wa.me/2349161259895?text=" + message);
}
</script>

</body>
</html>
